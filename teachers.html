        hashtag: "#歴史家"

      endo: {

        hobby: "買い物",
        skill: "寝ること、長時間睡眠",
        hashtag: "#料理"
      },

      // TA
      umei: {

        kana: "うめい こうき",

      inoue: {

        birthday: "2002年7月7日",
        hobby: "映画鑑賞",

        hashtag: "#ネコ好き"
      },
      goto: {

      suzuki: {

    function openModal(memberId) {
      const data = memberData[memberId];
      if (!data) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="teacher-card-horizontal">
          <div class="teacher-image-wrapper">
            <div class="gray-placeholder">
              <img src="${data.image}" alt="${data.name}">
            </div>
          </div>
          <div class="teacher-info-wrapper">
            <div class="name-badge">
              <h2>${data.name}</h2>
              <p>（${data.kana}）</p>
            </div>
            <dl class="profile-details">
              <div class="profile-item">生年月日：${data.birthday}</div>
              <div class="profile-item">趣味：${data.hobby}</div>
              <div class="profile-item">特技：${data.skill}</div>
              <div class="profile-item">自分を表すハッシュタグ：${data.hashtag}</div>
            </dl>
          </div>
        </div>
      `;

      document.getElementById('profileModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('profileModal').style.display = 'none';
    }
  </script>
